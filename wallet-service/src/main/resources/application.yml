server:
  port: ${PORT:8081}

spring:
  application:
    name: wallet-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/paylite_wallet?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:paylite}
    password: ${SPRING_DATASOURCE_PASSWORD:paylite_dev_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: ${SHOW_SQL:true}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl:
       enabled: ${SPRING_DATA_REDIS_SSL:false}
      timeout: 2000ms
      connect-timeout: 2000ms

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.paylite: ${LOG_LEVEL:DEBUG}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:DEBUG}

paylite:
  jwt:
    secret: ${PAYLITE_JWT_SECRET:Tqk6ZTIA+54x7c9lf/Sl/io2Sfl54qUgtn+30uKnRH9e3+0krLZbozJP6EcXjr3HggSbgmgXY1nGPoHVdMbs/w==}
    expiration-ms: ${PAYLITE_JWT_EXPIRATION_MS:900000}
    issuer: paylite-wallet-service