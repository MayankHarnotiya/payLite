# Test-only Spring config. Database URL/credentials are overridden at runtime
# by the @DynamicPropertySource in the test class.

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

paylite:
  kafka:
    enabled: false

logging:
  level:
    org.hibernate.SQL: WARN
    org.testcontainers: INFO