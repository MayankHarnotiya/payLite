server:
  port: 8081

spring:
  application:
    name: wallet-service

  datasource:
    url: jdbc:mysql://localhost:3307/paylite_wallet?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: paylite
    password: paylite_dev_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.paylite: DEBUG
    org.hibernate.SQL: DEBUG