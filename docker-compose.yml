# docker-compose.yml
# PayLite local infrastructure: PostgreSQL + Redis + pgAdmin
# Start everything: docker compose up -d
# Stop everything (keep data): docker compose down
# Stop everything and wipe data: docker compose down -v

services:

  postgres:
    image: postgres:16-alpine
    container_name: paylite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: paylite
      POSTGRES_PASSWORD: paylite_dev_password
      POSTGRES_DB: paylite_wallet
    ports:
      - "5432:5432"
    volumes:
      - paylite_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paylite -d paylite_wallet"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: paylite-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@paylite.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - paylite_pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: paylite-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - paylite_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  paylite_postgres_data:
  paylite_redis_data:
  paylite_pgadmin_data: