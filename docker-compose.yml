# docker-compose.yml
# PayLite local infrastructure: MySQL + Redis + phpMyAdmin

services:

  mysql:
    image: mysql:8.0
    container_name: paylite-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev_password
      MYSQL_DATABASE: paylite_wallet
      MYSQL_USER: paylite
      MYSQL_PASSWORD: paylite_dev_password
    ports:
      - "3307:3306"
    volumes:
      - paylite_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "paylite", "-ppaylite_dev_password"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: paylite-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: paylite
      PMA_PASSWORD: paylite_dev_password
      UPLOAD_LIMIT: 64M
    ports:
      - "5050:80"
    depends_on:
      mysql:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: paylite-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - paylite_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  paylite_mysql_data:
  paylite_redis_data: